<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu de Redes Sociais</title>
  <link rel="stylesheet" href="style.css">
  <!-- Font Awesome para os ícones das redes -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <div class="barra aberta" id="barra">

    <div class="icones">
      <a href="#" class="item pinterest" data-nome="Pinterest"><i class="fa-brands fa-pinterest-p"></i></a>
      <a href="#" class="item linkedin"  data-nome="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
      <a href="#" class="item youtube"   data-nome="YouTube"><i class="fa-brands fa-youtube"></i></a>
      <a href="#" class="item dribbble"  data-nome="Dribbble"><i class="fa-brands fa-dribbble"></i></a>
      <a href="#" class="item github"    data-nome="GitHub"><i class="fa-brands fa-github"></i></a>
      <a href="#" class="item facebook"  data-nome="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
      <a href="#" class="item twitter"   data-nome="Twitter"><i class="fa-brands fa-twitter"></i></a>
    </div>

    <!-- Botão que fecha (X) / abre (+) a barra -->
    <button class="toggle" id="toggle" title="Fechar">
      <i class="fa-solid fa-xmark"></i>
    </button>

  </div>

  <script src="script.js"></script>
</body>
</html>
